<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Użytkownika {{ username }} - Biometria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button id="logoutBtn" onclick="logout()">Wyloguj się</button>
            <h1>✨ Biometric Challenge</h1>
            <p>Test szybkości reagowania i precyzji</p>
            <div class="user-badge">Użytkownik: <strong>{{ username }}</strong></div>
        </div>

        <div class="content">
            <div class="status-bar">
                Sesja aktywna i monitorowana
            </div>

            <!-- Sekcja gry -->
            <section id="gameContainer">
                <h2>🎮 Kliknij diament!</h2>
                <div id="gameInfo">
                    <div class="stat-card">
                        <label>Wynik</label>
                        <div class="value" id="score">0</div>
                    </div>
                    <div class="stat-card">
                        <label>Czas</label>
                        <div class="value" id="time">0.00</div>
                    </div>
                    <div class="stat-card">
                        <label>Status</label>
                        <div class="value" style="font-size: 18px; color: #999;" id="status">—</div>
                    </div>
                </div>
                <div id="gameArea"></div>
                <div id="controls">
                    <button id="startBtn">▶️ Start Gry</button>
                    <button id="stopBtn" disabled>⏹️ Zatrzymaj</button>
                    <button id="trainBtn" onclick="trainModel()" style="background-color: #2196F3; margin-left: 10px; color: white;">🧠 Trenuj Model</button>
                </div>
            </section>
        </div>
    </div>

    <script>
        function trainModel() {
            const btn = document.getElementById('trainBtn');
            btn.disabled = true;
            btn.innerHTML = "⏳ Trenowanie...";
            
            fetch('/api/train', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert('✅ ' + data.message);
                    } else {
                        alert('❌ Błąd: ' + data.message);
                    }
                })
                .catch(err => {
                    alert('❌ Serwer nie odpowiada.');
                    console.error(err);
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = "🧠 Trenuj Model";
                });
        }
    </script>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/tracker.js"></script>
    <script src="/static/js/game.js"></script>
</body>
</html>
